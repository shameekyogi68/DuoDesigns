# ──────────────────────────────────────────────────
# Render Blueprint — Duo Designs Backend
# Deploy: connect this repo on render.com → auto-detect
# ──────────────────────────────────────────────────
services:
  - type: web
    name: duo-designs-api
    runtime: node
    region: singapore   # Closest to India
    plan: free          # Change to 'starter' ($7/mo) for always-on

    # Build + Start
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js

    # Health Check
    healthCheckPath: /health

    # Environment Variables (set actual values in Render dashboard)
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: MONGODB_URI
        sync: false  # Set manually in dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random string
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: SMTP_EMAIL
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLIENT_URL
        value: https://duodesigns.in
      - key: ADMIN_URL
        value: https://admin.duodesigns.in
      - key: SELLER_STATE
        value: Karnataka
      - key: SELLER_GSTIN
        sync: false
      - key: KEEP_ALIVE_URL
        fromService:
          type: web
          name: duo-designs-api
          property: host
